obfuscation:
  enabled: true
  reveal-on-exposure: true
  reveal-next-to-non-occluding-blocks: true
  # Exposed ores are revealed per player in this chunk radius. Updates occur only
  # on chunk transitions and block changes rather than continuously while moving.
  exposed-ore-reveal-chunk-radius: 2
  # Vertical block radius paired with exposed-ore-reveal-chunk-radius so large caves
  # do not pop nearby ore, while stacked caves do not become a long-range x-ray signal.
  exposed-ore-reveal-vertical-radius-blocks: 64
  live-sync-radius-blocks: 64
  initial-sync-chunk-radius: 0

protected-ores:
  - COAL_ORE
  - DEEPSLATE_COAL_ORE
  - COPPER_ORE
  - DEEPSLATE_COPPER_ORE
  - IRON_ORE
  - DEEPSLATE_IRON_ORE
  - GOLD_ORE
  - DEEPSLATE_GOLD_ORE
  - REDSTONE_ORE
  - DEEPSLATE_REDSTONE_ORE
  - EMERALD_ORE
  - DEEPSLATE_EMERALD_ORE
  - LAPIS_ORE
  - DEEPSLATE_LAPIS_ORE
  - DIAMOND_ORE
  - DEEPSLATE_DIAMOND_ORE
  - NETHER_GOLD_ORE
  - NETHER_QUARTZ_ORE
  - ANCIENT_DEBRIS

exposure:
  reveal-adjacent-materials:
    - AIR
    - CAVE_AIR
    - VOID_AIR
    - WATER
    - LAVA
  reveal-transparent-materials:
    - GLASS
    - GLASS_PANE
    - TINTED_GLASS
    - ICE
    - PACKED_ICE
    - BLUE_ICE

world-model:
  salted-distribution: false
  # Preset controlling fake ore density, rare ore caps, weighting, vein size, and performance.
  # salt-density is the baseline budget before the profile multiplier is applied.
  # Options: vanilla-friendly, balanced, aggressive, performance
  xray-profile: balanced
  # Rough fake ore block budget per chunk. Fake ore is generated in buried vein-like clusters.
  # Higher values increase the density of fake ore signals seen by X-ray users.
  salt-density: 96
  # Server-private salt for fake ore placement. Set this to a private random long before
  # enabling salted-distribution so fake ore signals are not derived from the public seed alone.
  salt-secret: 0

world-generation:
  enabled: false
  target-world: oreveil
  environment: NORMAL
  backup-on-regenerate: true
  generate-structures: true
  seed:
  # Server-private long for managed-world ore remixing. Set this before enabling
  # managed generation so remix positions are not derived from the public seed alone.
  secret: 0
  # Additional secret-seeded ore attempts. Original vanilla ores are always
  # relocated when managed generation is enabled, even when this is zero.
  ore-remix-attempts-per-chunk: 28
  # Reserved for a future terrain pass. Leave at 0 in current releases.
  terrain-adjustment-attempts-per-chunk: 0
  ruin-fragment-chance: 0.0

transport:
  # AUTO uses ProtocolLib when installed and otherwise uses block update sync.
  # Options: AUTO, BLOCK_UPDATE_SYNC, PROTOCOLLIB
  mode: AUTO

host-blocks:
  dimension-defaults:
    NORMAL: STONE
    NETHER: NETHERRACK
    THE_END: END_STONE
  ore-overrides:
    DEEPSLATE_COAL_ORE: DEEPSLATE
    DEEPSLATE_COPPER_ORE: DEEPSLATE
    DEEPSLATE_IRON_ORE: DEEPSLATE
    DEEPSLATE_GOLD_ORE: DEEPSLATE
    DEEPSLATE_REDSTONE_ORE: DEEPSLATE
    DEEPSLATE_EMERALD_ORE: DEEPSLATE
    DEEPSLATE_LAPIS_ORE: DEEPSLATE
    DEEPSLATE_DIAMOND_ORE: DEEPSLATE
    ANCIENT_DEBRIS: NETHERRACK
    NETHER_GOLD_ORE: NETHERRACK
    NETHER_QUARTZ_ORE: NETHERRACK
