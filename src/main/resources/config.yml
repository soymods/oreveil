obfuscation:
  enabled: true
  reveal-on-exposure: true
  reveal-next-to-non-occluding-blocks: true
  # How close (in blocks) a player must be to an exposed ore for it to be revealed to them.
  # Ores adjacent to caves are only shown to players within this radius; anyone further away
  # (including X-ray users) continues to see the obfuscated material.
  # Set to 0 to reveal all exposed ores globally (old behaviour, weaker against X-ray).
  reveal-proximity-blocks: 6
  live-sync-radius-blocks: 64
  initial-sync-chunk-radius: 0

protected-ores:
  - COAL_ORE
  - DEEPSLATE_COAL_ORE
  - COPPER_ORE
  - DEEPSLATE_COPPER_ORE
  - IRON_ORE
  - DEEPSLATE_IRON_ORE
  - GOLD_ORE
  - DEEPSLATE_GOLD_ORE
  - REDSTONE_ORE
  - DEEPSLATE_REDSTONE_ORE
  - EMERALD_ORE
  - DEEPSLATE_EMERALD_ORE
  - LAPIS_ORE
  - DEEPSLATE_LAPIS_ORE
  - DIAMOND_ORE
  - DEEPSLATE_DIAMOND_ORE
  - NETHER_GOLD_ORE
  - NETHER_QUARTZ_ORE
  - ANCIENT_DEBRIS

exposure:
  reveal-adjacent-materials:
    - AIR
    - CAVE_AIR
    - VOID_AIR
    - WATER
    - LAVA
  reveal-transparent-materials:
    - GLASS
    - GLASS_PANE
    - TINTED_GLASS
    - ICE
    - PACKED_ICE
    - BLUE_ICE

world-model:
  salted-distribution: false
  # Number of salt block placement attempts per chunk.
  # Higher values increase the density of fake ore signals seen by X-ray users.
  salt-density: 64

transport:
  mode: AUTO

host-blocks:
  dimension-defaults:
    NORMAL: STONE
    NETHER: NETHERRACK
    THE_END: END_STONE
  ore-overrides:
    DEEPSLATE_COAL_ORE: DEEPSLATE
    DEEPSLATE_COPPER_ORE: DEEPSLATE
    DEEPSLATE_IRON_ORE: DEEPSLATE
    DEEPSLATE_GOLD_ORE: DEEPSLATE
    DEEPSLATE_REDSTONE_ORE: DEEPSLATE
    DEEPSLATE_EMERALD_ORE: DEEPSLATE
    DEEPSLATE_LAPIS_ORE: DEEPSLATE
    DEEPSLATE_DIAMOND_ORE: DEEPSLATE
    ANCIENT_DEBRIS: NETHERRACK
    NETHER_GOLD_ORE: NETHERRACK
    NETHER_QUARTZ_ORE: NETHERRACK
