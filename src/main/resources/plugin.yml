name: Oreveil
version: ${version}
main: com.soymods.oreveil.bootstrap.OreveilPlugin
api-version: "1.21"
description: Deterministic server-side ore obfuscation with exposure-gated reveal rules.
author: soymods
load: STARTUP
website: https://github.com/soymods/oreveil
softdepend:
  - ProtocolLib
commands:
  oreveil:
    description: Opens the Oreveil admin GUI, with advanced command tools available.
    usage: /oreveil [gui|help|status|diagnostics|inspect|settings|get|explain|ores|ore|exposure|host|toggle|set|transport|profile|world|reload]
    permission: oreveil.admin
permissions:
  oreveil.admin:
    description: Allows management and inspection of Oreveil.
    default: op
